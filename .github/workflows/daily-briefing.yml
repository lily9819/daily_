name: 每日要闻简报

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: 抓取新闻并推送
        env:
          PUSH_TOKEN: ${{ secrets.PUSH_TOKEN }}
        run: |
          DATE=$(date '+%Y年%m月%d日')

          JD_NEWS="📦 京东：暂无"
          AI_NEWS="🤖 AI科技：暂无"
          USED_NEWS="🔁 二手电商：暂无"
          CAR_NEWS="🚗 汽车市场：暂无"

          python3 -c "
          import json, datetime
          d = datetime.datetime.now().strftime('%Y年%m月%d日')
          payload = {
              'token': '$PUSH_TOKEN',
              'title': f'📰 每日要闻简报 {d}',
              'content': f'''【每日要闻简报】{d}

━━━ 京东 ━━━
📦 京东：暂无

━━━ AI科技 ━━━
🤖 AI科技：暂无

━━━ 二手电商 ━━━
🔁 二手电商：暂无

━━━ 汽车市场 ━━━
🚗 汽车市场：暂无

⚠️ 基础版本，后续接入AI生成''',
              'template': 'html'
          }
          with open('/tmp/payload.json', 'w', encoding='utf-8') as f:
              json.dump(payload, f, ensure_ascii=False)
          "

          curl -X POST "http://www.pushplus.plus/send" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d @/tmp/payload.json
