name: 每日要闻简报

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: 抓取新闻并推送
        env:
          PUSH_TOKEN: ${{ secrets.PUSH_TOKEN }}
        run: |
          DATE=$(date '+%Y年%m月%d日 %A')

          JD_NEWS="📦 京东：暂无"
          AI_NEWS="🤖 AI科技：暂无"
          USED_NEWS="🔁 二手电商：暂无"
          CAR_NEWS="🚗 汽车市场：暂无"

          CONTENT="【每日要闻简报】${DATE}\n\n━━━ 京东 ━━━\n${JD_NEWS}\n\n━━━ AI科技 ━━━\n${AI_NEWS}\n\n━━━ 二手电商 ━━━\n${USED_NEWS}\n\n━━━ 汽车市场 ━━━\n${CAR_NEWS}\n\n⚠️ 基础版本，后续接入AI生成"

          CONTENT_ENCODED=$(echo "$CONTENT" | python3 -c "import sys,json;print(json.dumps(sys.stdin.read()))")

          curl -X POST "http://www.pushplus.plus/send" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "{\"token\":\"$PUSH_TOKEN\",\"title\":\"📰 每日要闻简报 $DATE\",\"content\":$CONTENT_ENCODED,\"template\":\"html\"}"
